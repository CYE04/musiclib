<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    >
    <meta name="description" content="CECP 诗歌库，供教会敬拜练习使用，包含诗歌搜索、歌词、简谱、移调、音频与每日推荐。">
    <meta name="theme-color" content="#F4EFE7" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#101613" media="(prefers-color-scheme: dark)">
    <meta property="og:title" content="CECP 诗歌库">
    <meta property="og:description" content="搜索诗歌、查看歌谱、移调练习与播放音频。">
    <meta property="og:image" content="./icons/icon-512.png">
    <meta property="og:type" content="website">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="CECP诗歌库">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>CECP诗歌库</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./icons/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">

    <script>
      (function () {
        try {
          var stored = localStorage.getItem("cecp:musiclib:theme") || "system";
          var mode = stored === "light" || stored === "dark" ? stored : "system";
          var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          var resolved = mode === "system" ? (prefersDark ? "dark" : "light") : mode;
          document.documentElement.setAttribute("data-theme", mode);
          document.documentElement.setAttribute("data-resolved-theme", resolved);
        } catch (_) {
          document.documentElement.setAttribute("data-theme", "system");
        }
      })();

      const key = new URLSearchParams(window.location.search).get("key");

      if (key !== "cecp2026") {
        alert("Access denied");
        window.location.replace("https://cecp.it");
      }
    </script>

    <style>
      /* 平板/移动端:禁双击放大(不影响滚动、点击、文本选择) */
      html, body { touch-action: manipulation; -webkit-text-size-adjust: 100%; }
      /* 页面级禁止横向滚动/左右摇摆(跑马灯等超宽内容只裁切,不产生横向滚动;
         内部自带横向滚动的区域不受影响) */
      html, body { overflow-x: hidden; overscroll-behavior-x: none; width: 100%; }
      #music-library { overflow-x: clip; }
    </style>
    <script>
      // iOS Safari 专有手势事件:禁双指缩放(standalone PWA 下 iOS 本身已禁,这里兜浏览器模式)
      ["gesturestart", "gesturechange", "gestureend"].forEach(function (t) {
        document.addEventListener(t, function (e) { e.preventDefault(); }, { passive: false });
      });
    </script>

    <link id="ml-style" rel="stylesheet" href="./musiclib.css?v=20260707-chord-v1">
  </head>

  <body>
    <div id="music-library"></div>

    <script src="./gsap.min.js?v=20260707-chord-v1"></script>
    <script src="./pinyin-dict.js?v=20260707-chord-v1"></script>
    <script src="./musiclib.js?v=20260707-chord-v1"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js?v=20260707-chord-v1").catch(() => {});
        });
      }
    </script>
  </body>
</html>
