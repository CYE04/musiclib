    <script>
      const key = new URLSearchParams(window.location.search).get("key");

      if (key !== "cecp2026") {
        alert("Access denied");
        window.location.replace("https://cecp.it");
      }
    </script>

    <link id="ml-style" rel="stylesheet" href="./musiclib.css?v=20260612-pullrefresh">

  <body>
    <div id="music-library"></div>

    <script src="./musiclib.js?v=20260612-pullrefresh"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
