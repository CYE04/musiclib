<!doctype html>
<html lang="zh-CN" data-resolved-theme="dark" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <title>投影输出 · CECP 诗歌库</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./musiclib.css?v=20260711-justify-rows">
  <style>
    /* 屏2 = 纯投影输出。无任何控制按钮; 内容由屏1(控制端)推送当前页, 这里只缩放铺满显示。 */
    html,body{height:100%;margin:0;background:#000;overflow:hidden;cursor:none;}
    #proj-bg{position:fixed;inset:0;z-index:0;background:#000 center/cover no-repeat;}
    #music-library,html[data-resolved-theme="dark"] #music-library{position:fixed;inset:0;display:block;background:transparent !important;color:#fff;z-index:1;}
    .proj-root{position:fixed;inset:0;display:flex;align-items:flex-start;justify-content:center;padding:2vh 3vw;box-sizing:border-box;}
    .proj-scale{transform-origin:top center;}
    /* 顶左对齐、正常排(每页字号统一, 内容少的页不放大、不居中) */
    #proj-page.sw-lb,html[data-resolved-theme="dark"] #music-library #proj-page.sw-lb{padding:0 !important;background:transparent !important;display:flex;flex-direction:column;justify-content:flex-start;align-items:flex-start;}
    #proj-page .sw-lsec-name{display:none;}
    .proj-sec{font-family:'Noto Sans SC',sans-serif;font-size:17px;font-weight:700;color:#ffe08a;margin:2px 0 6px;letter-spacing:1px;text-shadow:0 2px 10px rgba(0,0,0,.7);}
    /* 字体色: 用 --proj-text 变量(默认白), 一律带阴影保证任何背景清晰 */
    #music-library #proj-page .proj-title-key{color:var(--proj-text,#fff) !important;opacity:.9;text-shadow:0 2px 10px rgba(0,0,0,.75);}
    #music-library #proj-page .proj-title-name{color:var(--proj-text,#fff) !important;text-shadow:0 2px 12px rgba(0,0,0,.8),0 0 3px rgba(0,0,0,.6);}
    #music-library #proj-page .proj-verse,#music-library #proj-page .proj-verse .proj-vsec{color:var(--proj-text,#fff) !important;text-shadow:0 2px 10px rgba(0,0,0,.78),0 0 3px rgba(0,0,0,.6);}
    #music-library #proj-page .proj-verse .proj-vnum{color:#ffe08a !important;}
    #music-library #proj-page .p-lyric,
    #music-library #proj-page .p-pinyin,
    #music-library #proj-page .p-n,
    #music-library #proj-page .p-n *{ color:var(--proj-text,#fff) !important; text-shadow:0 2px 10px rgba(0,0,0,.78),0 0 3px rgba(0,0,0,.65); }
    #music-library #proj-page .p-pinyin{ opacity:.85; }
    /* 简谱下划拍线 / 连音弧 / 圆滑线 跟随字体色 */
    #music-library #proj-page .jp-u1-line,#music-library #proj-page .jp-u2-line{ background:var(--proj-text,#fff) !important; box-shadow:0 1px 3px rgba(0,0,0,.6); }
    #music-library #proj-page .jp-slur::before,#music-library #proj-page .jp-slur-open::before,#music-library #proj-page .jp-slur-close::before{ border-color:var(--proj-text,#fff) !important; }
    #music-library #proj-page .jp-tie path,#music-library #proj-page .jp-tie line{ stroke:var(--proj-text,#fff) !important; }
    .proj-black{position:fixed;inset:0;background:#000;z-index:60;}
    .proj-hint{position:fixed;left:0;right:0;bottom:8vh;text-align:center;color:rgba(255,255,255,.6);font-size:16px;font-family:'Noto Sans SC',sans-serif;padding:0 6vw;line-height:1.6;z-index:2;text-shadow:0 2px 8px rgba(0,0,0,.7);}
    .proj-badge{position:fixed;top:14px;left:0;right:0;text-align:center;color:rgba(255,255,255,.28);font-size:12px;letter-spacing:3px;pointer-events:none;font-family:'Noto Sans SC',sans-serif;z-index:2;text-shadow:0 1px 4px rgba(0,0,0,.7);}
  </style>
</head>
<body>
  <div id="proj-bg"></div>
  <div id="music-library" data-resolved-theme="dark">
    <div class="proj-root">
      <div class="proj-scale" id="proj-scale">
        <div class="sw-lb" id="proj-page"></div>
      </div>
    </div>
  </div>
  <div class="proj-black" id="proj-black" hidden></div>
  <div class="proj-hint" id="proj-hint">已就绪，等待控制台推送…</div>

  <script>
  (function(){
    "use strict";
    var CH_NAME='cecp:musiclib:projection:v1', BUS_KEY='cecp:musiclib:projection:bus:v1';
    var lastV=-1, chordInjected=false, curAspect='16:9', curRefW=0, curRefH=0;
    var $=function(id){return document.getElementById(id);};

    /* ── 通信(只收控制端, 不发控制) ── */
    var bc=null; try{ if(typeof BroadcastChannel!=='undefined') bc=new BroadcastChannel(CH_NAME); }catch(e){}
    function handle(msg){
      if(!msg||!msg.__cecpProj||msg.role==='projector') return;
      if(msg.t==='page'){
        if(typeof msg.v==='number'&&msg.v<=lastV) return;
        if(typeof msg.v==='number') lastV=msg.v;
        renderPage(msg);
      }else if(msg.t==='bg'){ applyBg(msg.bg||{}); }
      else if(msg.t==='fullscreen'){ tryFullscreen(); }
    }
    if(bc) bc.onmessage=function(e){ handle(e.data); };
    window.addEventListener('storage',function(e){ if(e.key!==BUS_KEY||!e.newValue)return; try{handle(JSON.parse(e.newValue));}catch(_){} });
    function send(msg){ msg.__cecpProj=true; msg.role='projector';
      if(bc){ try{ bc.postMessage(msg); return; }catch(_){}}
      try{ localStorage.setItem(BUS_KEY, JSON.stringify(Object.assign({_ts:Date.now()},msg))); }catch(_){}
    }

    function injectChordCss(css){
      if(chordInjected||!css) return;
      var st=document.createElement('style'); st.id='proj-chord-style'; st.textContent=css;
      document.head.appendChild(st); chordInjected=true;
    }
    /* ── 收当前页 -> 注入 + 缩放填充(信箱对齐 aspect) ── */
    function renderPage(msg){
      var p=msg.payload||{};
      injectChordCss(msg.chordCss);
      if(p.aspect==='4:3'||p.aspect==='16:9') curAspect=p.aspect;
      curRefW=Number(p.refW)||0; curRefH=Number(p.refH)||0;
      applyBg({css:p.bgCss,image:p.bgImage,video:p.bgVideo});   // 每首歌自己的背景(图/视频, 随页推送)
      $('proj-black').hidden=!p.blank;
      var cont=$('proj-page'); cont.style.setProperty('--proj-text', p.textColor||'#fff'); cont.innerHTML=p.html||'';
      var empty=!p.html;                                  // 歌单为空/无内容 -> 提示, 不留旧画面
      var hint=$('proj-hint'); hint.hidden=!empty; if(empty) hint.textContent='歌单为空，请在控制端加入诗歌或经文';
      fit();
    }
    function fit(){
      var root=document.querySelector('.proj-root');
      var scale=$('proj-scale'), page=$('proj-page');
      scale.style.transform='scale(1)'; page.style.height='auto';
      var pad=0.96;
      var avW=(root.clientWidth||window.innerWidth)*pad, avH=(root.clientHeight||window.innerHeight)*pad;
      var natH=page.scrollHeight||1;
      // 统一按控制端给的 参考宽+参考高 缩放 -> 同类每页字号完全一致(内容多/少的页都同倍率, 不再自动放大)
      var w=curRefW>0?curRefW:(page.scrollWidth||1);
      var refH=curRefH>0?curRefH:natH;
      var k=Math.min(avW/w, avH/refH);
      if(!isFinite(k)||k<=0)k=1;
      scale.style.transform='scale('+k+')';
    }
    window.addEventListener('resize',fit);

    /* ── 背景(纯色/渐变/图片/视频, 随页推送) ── */
    function applyBg(bg){
      var el=$('proj-bg');
      if(bg.video){
        var v=el.querySelector('video');
        if(!v){ el.innerHTML='<video autoplay loop muted playsinline style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover"></video>'; v=el.querySelector('video'); }
        if(v.getAttribute('src')!==bg.video){ v.src=bg.video; if(v.play)v.play().catch(function(){}); }
        el.style.background='#000';
      }else{
        if(el.querySelector('video')) el.innerHTML='';
        if(bg.image){ el.style.background='#000 url('+bg.image+') center/cover no-repeat'; }
        else{ el.style.background=bg.css||'#000'; }
      }
    }

    /* ── 全屏(best-effort; 控制端从副屏打开后尝试, 或收到 fullscreen 指令时) ── */
    function tryFullscreen(){
      if(document.fullscreenElement) return;
      var el=document.documentElement, req=el.requestFullscreen||el.webkitRequestFullscreen;
      if(req){ try{ req.call(el); }catch(_){} }
    }
    // 打开即尝试一次(部分浏览器在"从 opener 手势打开的新窗口"里允许)
    tryFullscreen();

    /* ── Wake Lock 防息屏(不支持则静默降级) ── */
    var wakeLock=null;
    function acquireWake(){
      try{
        if('wakeLock' in navigator && document.visibilityState==='visible'){
          navigator.wakeLock.request('screen').then(function(w){ wakeLock=w; }).catch(function(){});
        }
      }catch(_){}
    }
    document.addEventListener('visibilitychange',function(){ if(document.visibilityState==='visible') acquireWake(); });
    acquireWake();

    /* ── 握手 ── */
    send({t:'hello'});
    window.addEventListener('pageshow',function(){ send({t:'hello'}); });
    window.addEventListener('beforeunload',function(){ send({t:'bye'}); });
  })();
  </script>
</body>
</html>
